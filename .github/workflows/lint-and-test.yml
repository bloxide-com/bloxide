# Copyright 2025 Bloxide, all rights reserved
name: Lint and Test Rust Backend

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - ".github/**"
      - "crates/**"
      - "runtimes/**"
      - "examples/**"
      - "tools/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:

  copyright_compliance:
    name: Check Copyright Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Copyright Compliance
        run: |
          INCORRECT_COPYRIGHT=$(find . \( -name '*.rs' -o -name 'Cargo.toml' \) -not -path '*/target/*' \
          | xargs grep -LE '(#|//) Copyright 202[0-9] Bloxide, all rights reserved')
          if [ -n "$INCORRECT_COPYRIGHT" ]; then
            echo "Incorrect copyright notice found:"
            echo "$INCORRECT_COPYRIGHT" | tr ' ' '\n'
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        run: |
          rustup show
          rustup component add rustfmt clippy
          rustup target add riscv32imc-unknown-none-elf

      - name: Cargo Build
        run: |
          echo "Building with default features..."
          cargo build

      - name: Cargo Feature Matrix Check (no_std / alloc / std / all-features)
        run: |
          # no_std (bare, no alloc) — verifies true no_std compatibility
          cargo check -p bloxide-core --no-default-features
          cargo check -p bloxide-messaging --no-default-features
          cargo check -p bloxide-peers --no-default-features
          cargo check -p bloxide-supervisor --no-default-features
          cargo check -p bloxide-supervisor-context --no-default-features
          cargo check -p bloxide-timer --no-default-features
          cargo check -p ping-pong-messages --no-default-features

          # alloc-only (no_std + alloc) — verifies heap-based no_std
          cargo check -p bloxide-core --no-default-features --features alloc
          cargo check -p bloxide-messaging --no-default-features --features alloc
          cargo check -p bloxide-peers --no-default-features --features alloc
          cargo check -p bloxide-supervisor --no-default-features --features alloc
          cargo check -p bloxide-supervisor-context --no-default-features --features alloc
          cargo check -p bloxide-timer --no-default-features --features alloc

          # std — verifies std-gated code paths
          cargo check -p bloxide-core --features std
          cargo check -p bloxide-messaging --features std
          cargo check -p bloxide-peers --features std
          cargo check -p bloxide-supervisor --features std
          cargo check -p bloxide-supervisor-context --features std
          cargo check -p bloxide-timer --features std

          # all host-compatible features (excludes defmt — embedded-only)
          cargo check --workspace --features bloxide-log/log

          # Embassy target (riscv32imc, no_std)
          cargo check -p bloxide-timer --target riscv32imc-unknown-none-elf

          # Optional features
          cargo check -p bloxide-core --features tracing
          cargo check -p bloxide-supervisor-context --features dynamic

      - name: Cargo Format
        run: |
          cargo fmt -- --check

      - name: Cargo Clippy
        run: |
          cargo clippy --all-targets -- -W warnings -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run workspace tests (default features)
        run: |
          cargo test --workspace

      - name: Run std-gated tests (all crates with std feature)
        run: |
          cargo test -p bloxide-core --features std
          cargo test -p bloxide-messaging --features std
          cargo test -p bloxide-peers --features std
          cargo test -p bloxide-supervisor --features std
          cargo test -p bloxide-supervisor-context --features std
          cargo test -p bloxide-timer --features std

      - name: Run alloc-only tests
        run: |
          cargo test -p bloxide-supervisor --no-default-features --features alloc
          cargo test -p bloxide-supervisor-context --no-default-features --features alloc

      - name: Run optional-feature tests
        run: |
          cargo test -p bloxide-core --features tracing
          cargo test -p bloxide-supervisor-context --features dynamic

      - name: Run all host-compatible feature tests
        run: |
          cargo test --workspace --features bloxide-log/log

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cargo install cargo-tarpaulin

      - name: Show toolchain information
        run: |
          rustup toolchain list
          cargo --version

      - name: Run tests and report code coverage
        run: |
          RUSTC_BOOTSTRAP=1 cargo tarpaulin -o xml -o lcov -o html --doc --tests

      - name: Upload coverage report (xml)
        uses: actions/upload-artifact@v4
        with:
          name: Test Coverage Results (xml)
          path: cobertura.xml

      - name: Upload coverage report (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: Test Coverage Results (lcov)
          path: lcov.info

      - name: Upload coverage report (html)
        uses: actions/upload-artifact@v4
        with:
          name: Test Coverage Results (html)
          path: tarpaulin-report.html

  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Create Documentation for bloxide
        working-directory: ${{github.workspace}}
        run: RUSTDOCFLAGS=-Dwarnings cargo doc --workspace --no-deps

  round-trip-verify:
    name: Round-trip Verification (blox.toml → codegen → viz-export → JSON)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run round-trip integration tests
        run: |
          cargo test -p bloxide-viz-export --test round_trip

      - name: Run cargo blox verify
        run: |
          cargo run -p cargo-blox -- blox verify
