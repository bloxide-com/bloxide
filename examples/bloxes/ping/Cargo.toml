[package]
name = "ping-blox"
version.workspace = true
edition.workspace = true
description = "Ping actor blox — runtime-agnostic"

[features]
default = ["std"]
std = ["bloxide-core/std"]

[dependencies]
bloxide-core        = { path = "../../../crates/bloxide-core", features = ["alloc"] }
bloxide-macros      = { path = "../../../crates/bloxide-macros" }
bloxide-log         = { path = "../../../crates/bloxide-log" }
bloxide-timer       = { path = "../../../crates/bloxide-timer" }
ping-pong-actions   = { path = "../../actions/ping-pong-actions" }
ping-pong-messages  = { path = "../../messages/ping-pong-messages" }
[dev-dependencies]
bloxide-core        = { path = "../../../crates/bloxide-core", features = ["std"] }
