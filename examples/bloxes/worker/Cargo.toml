[package]
name = "worker-blox"
version.workspace = true
edition.workspace = true
description = "Worker actor blox for the pool example — runtime-agnostic"

[features]
default = []
std = [
    "bloxide-core/std",
    "bloxide-spawn/std",
    "pool-actions/std",
]

[dependencies]
bloxide-core    = { path = "../../../crates/bloxide-core", features = ["alloc"] }
bloxide-spawn   = { path = "../../../crates/bloxide-spawn" }
bloxide-macros  = { path = "../../../crates/bloxide-macros" }
bloxide-log     = { path = "../../../crates/bloxide-log" }
pool-messages   = { path = "../../messages/pool-messages" }
pool-actions    = { path = "../../actions/pool-actions" }

[dev-dependencies]
bloxide-core    = { path = "../../../crates/bloxide-core", features = ["std"] }
bloxide-spawn   = { path = "../../../crates/bloxide-spawn", features = ["std"] }
