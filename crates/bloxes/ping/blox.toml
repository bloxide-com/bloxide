[actor]
name = "Ping"

[context]
name = "PingCtx"
generics = "<R: BloxRuntime, B: HasCurrentTimer + CountsRounds>"
extra_where = ["B: Default", "B::Round: Into<u32>"]
on_init = "ctx.behavior = B::default();"
imports = [
    "ping_pong_messages::PingPongMsg",
    "bloxide_timer::{TimerCommand, TimerId}",
]

# Accessor traits from bloxide-messaging (2-param, require #[provides])
[[context.uses]]
crate = "bloxide_messaging"
trait = "HasPeerRef<R, PingPongMsg>"
field = "peer_ref"
field_type = "ActorRef<PingPongMsg, R>"
role = "accessor"

[[context.uses]]
crate = "bloxide_messaging"
trait = "HasSelfRef<R, PingPongMsg>"
field = "self_ref"
field_type = "ActorRef<PingPongMsg, R>"
role = "accessor"

# Accessor trait from bloxide-timer (1-param, convention-based inference works)
[[context.uses]]
crate = "bloxide_timer"
trait = "HasTimerRef<R>"
field = "timer_ref"
field_type = "ActorRef<TimerCommand, R>"
role = "accessor"

# Behavior traits from context crates (delegatable)
[[context.uses]]
crate = "blox_ctx_current_timer"
trait = "HasCurrentTimer"
delegatable = true

[[context.uses]]
crate = "blox_ctx_rounds"
trait = "CountsRounds"
delegatable = true

[event]
name = "PingEvent"

[[event.mailboxes]]
variant = "Msg"
message = "PingPongMsg"
message_path = "ping_pong_messages::PingPongMsg"

[topology]
spec_imports = [
    "ping_pong_actions::{increment_round, send_initial_ping}",
    "crate::{MAX_ROUNDS, PAUSE_AT_ROUND}",
]

[[topology.states]]
name = "Operating"
composite = true

[[topology.states]]
name = "Active"
parent = "Operating"
initial = true

[[topology.states]]
name = "Paused"
parent = "Operating"

[[topology.states]]
name = "Done"
terminal = true

[[topology.states]]
name = "Error"
error = true

# --- Declarative transitions ---

# Operating: composite state, catches Pong to prevent bubbling
[[topology.transitions]]
state = "Operating"
event = "PingPongMsg::Pong(_)"
target = "stay"

# Active: entry increments round, logs, sends ping; handles Pong with guards
[[topology.entry]]
state = "Active"
actions = ["increment_round", "Self::log_round", "send_initial_ping"]

[[topology.transitions]]
state = "Active"
event = "PingPongMsg::Pong(_)"
target = "Active"
actions = ["Self::log_pong_received", "Self::forward_ping"]

[[topology.transitions.guards]]
condition = "results.any_failed()"
target = "Error"

[[topology.transitions.guards]]
condition = "ctx.round() >= B::Round::from(MAX_ROUNDS)"
target = "Done"

[[topology.transitions.guards]]
condition = "ctx.round() == B::Round::from(PAUSE_AT_ROUND)"
target = "Paused"

# Paused: entry schedules timer, exit cancels it; Resume → Active
[[topology.entry]]
state = "Paused"
actions = ["Self::schedule_pause_timer"]

[[topology.exit]]
state = "Paused"
actions = ["Self::cancel_pause_timer"]

[[topology.transitions]]
state = "Paused"
event = "PingPongMsg::Resume(_)"
target = "Active"
actions = ["Self::forward_ping"]

# Done: entry logs completion
[[topology.entry]]
state = "Done"
actions = ["Self::log_done"]

# Error: entry logs error
[[topology.entry]]
state = "Error"
actions = ["Self::log_error"]
