[actor]
name = "Counter"

[context]
name = "CounterCtx"
generics = "<B: CountsTicks>"
on_init = "ctx.set_count(B::Count::from(0));"

# Behavior trait from context crate (delegatable)
[[context.uses]]
crate = "blox_ctx_ticks"
trait = "CountsTicks"
delegatable = true

[event]
name = "CounterEvent"

[[event.mailboxes]]
variant = "Msg"
message = "CounterMsg"
message_path = "counter_messages::CounterMsg"

[topology]

[[topology.states]]
name = "Ready"
initial = true

[[topology.states]]
name = "Done"
terminal = true
# --- Declarative transitions ---

[[topology.transitions]]
state = "Ready"
event = "CounterMsg::Tick(_)"
target = "stay"
actions = ["Self::count_tick"]

[[topology.transitions.guards]]
condition = "ctx.count() >= B::Count::from(2)"
target = "Done"

[[topology.transitions.guards]]
condition = "_"
target = "stay"
