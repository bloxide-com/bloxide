[actor]
name = "Counter"

[context]
name = "CounterCtx"
generics = "<B: CountsTicks>"
on_init = "ctx.set_count(B::Count::from(0));"

# Behavior trait from context crate (delegatable)
[[context.uses]]
crate = "blox_ctx_ticks"
trait = "CountsTicks"
delegatable = true

# Blox-specific fields
[[context.fields]]
name = "self_id"
ty = "ActorId"

[[context.fields]]
name = "behavior"
ty = "B"
delegates = ["CountsTicks"]

[event]
name = "CounterEvent"

[[event.mailboxes]]
variant = "Msg"
message = "CounterMsg"
message_path = "counter_messages::CounterMsg"

[topology]
# Legacy: hand-written StateFns constants in actions.rs
handler_fns = ["READY_FNS", "DONE_FNS"]

[[topology.states]]
name = "Ready"
initial = true

[[topology.states]]
name = "Done"
terminal = true

# --- Declarative transitions (documentation; handler_fns takes precedence) ---
[[topology.transitions]]
state = "Ready"
event = "CounterMsg::Tick(_)"
target = "stay"
actions = ["Self::count_tick"]

[[topology.transitions.guards]]
condition = "ctx.count() >= B::Count::from(2)"
target = "Done"

[[topology.transitions.guards]]
condition = "_"
target = "stay"
