[actor]
name = "Worker"

[event]
name = "WorkerEvent"
generics = "<R: BloxRuntime>"
debug = false

[[event.mailboxes]]
variant = "Ctrl"
message = "WorkerCtrl"
message_path = "pool_messages::WorkerCtrl<R>"

[[event.mailboxes]]
variant = "Msg"
message = "WorkerMsg"
message_path = "pool_messages::WorkerMsg"

[topology]
# Legacy: hand-written StateFns constants in actions.rs
handler_fns = ["WAITING_FNS", "DONE_FNS"]

[[topology.states]]
name = "Waiting"
initial = true

[[topology.states]]
name = "Done"
terminal = true

[context]
name = "WorkerCtx"
generics = "<R: BloxRuntime, B: HasWorkerPeers<R> + HasCurrentTask>"
on_init = "ctx.set_task_id(0); ctx.set_result(0); ctx.peers_mut().clear();"
imports = [
    "pool_messages::{PoolMsg, WorkerMsg}",
    "alloc::vec::Vec",
]

# Accessor trait from context crate (1-param, convention-based inference works)
[[context.uses]]
crate = "blox_ctx_pool_ref"
trait = "HasPoolRef<R>"
field = "pool_ref"
field_type = "ActorRef<PoolMsg, R>"
role = "accessor"

# Behavior traits from context crates (delegatable)
[[context.uses]]
crate = "blox_ctx_worker_peers"
trait = "HasWorkerPeers<R>"
delegatable = true

[[context.uses]]
crate = "blox_ctx_current_task"
trait = "HasCurrentTask"
delegatable = true

# Blox-specific fields
[[context.fields]]
name = "self_id"
ty = "ActorId"

[[context.fields]]
name = "behavior"
ty = "B"
delegates = ["HasWorkerPeers<R>", "HasCurrentTask"]

# --- Declarative transitions (documentation; handler_fns takes precedence) ---

# Waiting: entry logs; handles ctrl (AddPeer/RemovePeer), DoWork → Done, PeerResult stays
[[topology.entry]]
state = "Waiting"
actions = ["Self::log_waiting"]

[[topology.transitions]]
state = "Waiting"
event = "WorkerCtrl::AddPeer(_) | WorkerCtrl::RemovePeer(_)"
target = "stay"
actions = ["Self::handle_ctrl"]

[[topology.transitions]]
state = "Waiting"
event = "WorkerMsg::DoWork(_)"
target = "Done"
actions = ["Self::process_work"]

[[topology.transitions]]
state = "Waiting"
event = "WorkerMsg::PeerResult(_)"
target = "stay"

# Done: entry logs, broadcasts to peers, notifies pool
[[topology.entry]]
state = "Done"
actions = ["Self::log_done", "Self::do_broadcast", "Self::do_notify_pool"]
