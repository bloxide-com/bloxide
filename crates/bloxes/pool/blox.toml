[actor]
name = "Pool"

[event]
name = "PoolEvent"
generics = "<R: BloxRuntime>"

[[event.mailboxes]]
variant = "Msg"
message = "PoolMsg"
message_path = "pool_messages::PoolMsg"

[[event.mailboxes]]
variant = "SpawnReply"
message = "SpawnedWorker"
message_path = "pool_messages::SpawnedWorker<R>"

[context]
name = "PoolCtx"
generics = "<R: BloxRuntime>"
on_init = "ctx.worker_refs_mut().clear(); ctx.worker_ctrls_mut().clear(); ctx.set_pending(0);"
imports = [
    "pool_messages::{PoolMsg, WorkerCtrl, WorkerMsg, AppSpawnRequest, SpawnedWorker}",
    "alloc::vec::Vec",
]

# Accessor trait from bloxide-messaging (2-param, requires #[provides])
[[context.uses]]
crate = "bloxide_messaging"
trait = "HasSelfRef<R, PoolMsg>"
field = "self_ref"
field_type = "ActorRef<PoolMsg, R>"
role = "accessor"

# Multi-field context crate: HasWorkers with impl macro
[[context.uses]]
crate = "blox_ctx_workers"
traits = ["HasWorkers<R>"]
impl_macro = "impl_has_workers"

  [[context.uses.fields]]
  name = "worker_refs"
  ty = "Vec<ActorRef<WorkerMsg, R>>"
  role = "state"

  [[context.uses.fields]]
  name = "worker_ctrls"
  ty = "Vec<ActorRef<WorkerCtrl<R>, R>>"
  role = "state"

  [[context.uses.fields]]
  name = "pending"
  ty = "u32"
  role = "state"

# Blox-specific fields
[[context.fields]]
name = "self_id"
ty = "ActorId"

# Ref to the supervisor's spawn mailbox — Pool sends AppSpawnRequest here
[[context.fields]]
name = "spawn_ref"
ty = "ActorRef<AppSpawnRequest<R>, R>"
role = "ctor"

# Ref to the Pool's own spawn-reply mailbox — included in AppSpawnRequest as reply_to
[[context.fields]]
name = "spawn_reply_ref"
ty = "ActorRef<SpawnedWorker<R>, R>"
role = "ctor"

# Pending task_id for the in-flight spawn request (Spawning state)
[[context.fields]]
name = "pending_task_id"
ty = "u32"
role = "state"

[topology]
# Legacy: hand-written StateFns constants in actions.rs
handler_fns = ["IDLE_FNS", "SPAWNING_FNS", "ACTIVE_FNS", "ALL_DONE_FNS"]

[[topology.states]]
name = "Idle"
initial = true

[[topology.states]]
name = "Spawning"

[[topology.states]]
name = "Active"

[[topology.states]]
name = "AllDone"
terminal = true

# --- Declarative transitions (documentation; handler_fns takes precedence) ---

# Idle: SpawnWorker → Spawning
[[topology.transitions]]
state = "Idle"
event = "PoolMsg::SpawnWorker(_)"
target = "Spawning"
actions = ["handle_spawn_worker"]

# Spawning: SpawnedWorker reply → Active
[[topology.transitions]]
state = "Spawning"
event = "SpawnedWorker(_)"
target = "Active"
actions = ["handle_spawned_worker"]

# Active: SpawnWorker → Spawning (async spawn)
[[topology.transitions]]
state = "Active"
event = "PoolMsg::SpawnWorker(_)"
target = "Spawning"
actions = ["handle_spawn_worker"]

# Active: WorkDone with guard
[[topology.transitions]]
state = "Active"
event = "PoolMsg::WorkDone(_)"
target = "stay"
actions = ["handle_work_done"]

[[topology.transitions.guards]]
condition = "ctx.pending() == 0"
target = "AllDone"

# AllDone: entry logs completion
[[topology.entry]]
state = "AllDone"
actions = ["log_all_done"]
