[actor]
name = "Pool"

# ── Event type (standard codegen-generated event enum) ──────────────────────
# The SpawnReply mailbox is dynamic-only (carries SpawnedWorker replies from
# spawned child workers). The Msg mailbox is always present.
[event]
name = "PoolEvent"
generics = "<R: BloxRuntime>"
feature = "dynamic"
feature_generics = "<R: BloxRuntime>"

[[event.mailboxes]]
variant = "Msg"
message = "PoolMsg"
message_path = "pool_messages::PoolMsg"

[[event.mailboxes]]
variant = "SpawnReply"
message = "SpawnedWorker"
message_path = "pool_messages::SpawnedWorker<R>"
feature = "dynamic"

# ── Context struct ───────────────────────────────────────────────────────────
# Paired #[cfg] generation: the non-dynamic variant excludes spawn fields,
# spawn imports, and spawn transitions. The dynamic variant includes everything.

[context]
name = "PoolCtx"
generics = "<R: BloxRuntime>"
feature = "dynamic"
feature_generics = "<R: BloxRuntime>"
on_init = "ctx.worker_refs_mut().clear(); ctx.worker_ctrls_mut().clear(); ctx.set_pending(0);"
imports = [
    "pool_messages::{PoolMsg, WorkerMsg}",
    "bloxide_peers::PeerCtrl",
    "alloc::vec::Vec",
]
feature_imports = [
    "pool_messages::{SpawnRequest, SpawnedWorker}",
    "bloxide_spawn::SpawnFn",
    "bloxide_core::lifecycle::ChildLifecycleEvent",
    "bloxide_supervisor::SupervisorControl",
]

# Accessor trait from bloxide-messaging (2-param, requires #[provides])
[[context.uses]]
crate = "bloxide_messaging"
trait = "HasSelfRef<R, PoolMsg>"
field = "self_ref"
field_type = "ActorRef<PoolMsg, R>"
role = "accessor"

# Multi-field context crate: HasWorkers with impl macro
[[context.uses]]
crate = "blox_ctx_workers"
traits = ["HasWorkers<R>"]
impl_macro = "impl_has_workers"

  [[context.uses.fields]]
  name = "worker_refs"
  ty = "Vec<ActorRef<WorkerMsg, R>>"
  role = "state"

  [[context.uses.fields]]
  name = "worker_ctrls"
  ty = "Vec<ActorRef<PeerCtrl<WorkerMsg, R>, R>>"
  role = "state"

  [[context.uses.fields]]
  name = "pending"
  ty = "u32"
  role = "state"

# Blox-specific fields
[[context.fields]]
name = "self_id"
ty = "ActorId"

# ── Dynamic-only fields (gated by Pool's `dynamic` feature) ──────────────────

# Spawn function (fn pointer, provided at wiring time)
[[context.fields]]
name = "spawn_fn"
ty = "SpawnFn<R, SpawnRequest<R>>"
role = "ctor"
feature = "dynamic"

# Ref to the supervisor's control mailbox — Pool sends RegisterDynamicChild here
# (via the spawn_child helper, not directly)
[[context.fields]]
name = "spawn_ref"
ty = "ActorRef<SupervisorControl<R>, R>"
role = "ctor"
feature = "dynamic"

# Ref to the supervisor's child-notify mailbox — passed to the spawn helper
[[context.fields]]
name = "notify_ref"
ty = "ActorRef<ChildLifecycleEvent, R>"
role = "ctor"
feature = "dynamic"

# Ref to the Pool's own spawn-reply mailbox — included in SpawnRequest as reply_to
[[context.fields]]
name = "spawn_reply_ref"
ty = "ActorRef<SpawnedWorker<R>, R>"
role = "ctor"
feature = "dynamic"

# Pending task_id for the in-flight spawn request (Spawning state)
[[context.fields]]
name = "pending_task_id"
ty = "u32"
role = "state"
feature = "dynamic"

# True when a spawn request has been sent but the SpawnReply hasn't arrived yet.
# Prevents premature AllDone transition while workers are still being spawned.
[[context.fields]]
name = "spawn_in_flight"
ty = "bool"
role = "state"
feature = "dynamic"

# Queue of task_ids waiting to be spawned (buffered while in Spawning state)
[[context.fields]]
name = "spawn_queue"
ty = "Vec<u32>"
role = "state"
feature = "dynamic"

[topology]
spec_imports = [
    "crate::actions::{handle_work_done, log_all_done}",
]
feature_spec_imports = [
    "crate::actions::{handle_spawn_worker, handle_spawn_worker_queued, handle_spawned_worker}",
]

[[topology.states]]
name = "Idle"
initial = true

[[topology.states]]
name = "Spawning"

[[topology.states]]
name = "Active"

[[topology.states]]
name = "AllDone"
terminal = true

# --- Declarative transitions ---

# Idle: SpawnWorker → Spawning (dynamic only)
[[topology.transitions]]
state = "Idle"
event = "PoolMsg::SpawnWorker(_)"
target = "Spawning"
actions = ["handle_spawn_worker"]
feature = "dynamic"

# Spawning: SpawnedWorker reply → Active (or stay Spawning if more spawns in-flight/queued, or AllDone if all workers already finished)
[[topology.transitions]]
state = "Spawning"
event = "PoolEvent::SpawnReply(_)"
target = "Active"
actions = ["handle_spawned_worker"]
feature = "dynamic"

[[topology.transitions.guards]]
condition = "ctx.spawn_in_flight || !ctx.spawn_queue.is_empty()"
target = "Spawning"

[[topology.transitions.guards]]
condition = "ctx.pending() == 0 && !ctx.worker_refs().is_empty()"
target = "AllDone"

# Spawning: buffer additional SpawnWorker requests while waiting for reply
[[topology.transitions]]
state = "Spawning"
event = "PoolMsg::SpawnWorker(_)"
target = "stay"
actions = ["handle_spawn_worker_queued"]
feature = "dynamic"

# Spawning: handle WorkDone while waiting for spawn reply
[[topology.transitions]]
state = "Spawning"
event = "PoolMsg::WorkDone(_)"
target = "stay"
actions = ["handle_work_done"]

# Active: SpawnWorker → Spawning (async spawn, dynamic only)
[[topology.transitions]]
state = "Active"
event = "PoolMsg::SpawnWorker(_)"
target = "Spawning"
actions = ["handle_spawn_worker"]
feature = "dynamic"

# Active: WorkDone with guard
[[topology.transitions]]
state = "Active"
event = "PoolMsg::WorkDone(_)"
target = "stay"
actions = ["handle_work_done"]

[[topology.transitions.guards]]
condition = "ctx.pending() == 0"
target = "AllDone"

# AllDone: entry logs completion
[[topology.entry]]
state = "AllDone"
actions = ["log_all_done"]
