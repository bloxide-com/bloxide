[actor]
name = "Pool"

[event]
name = "PoolEvent"

[[event.mailboxes]]
variant = "Msg"
message = "PoolMsg"
message_path = "pool_messages::PoolMsg"

[context]
name = "PoolCtx"
generics = "<R: BloxRuntime>"
on_init = "ctx.worker_refs_mut().clear(); ctx.worker_ctrls_mut().clear(); ctx.set_pending(0);"
imports = [
    "pool_messages::{PoolMsg, WorkerCtrl, WorkerMsg}",
    "blox_ctx_workers::WorkerSpawnFn",
    "alloc::vec::Vec",
]

# Accessor trait from bloxide-messaging (2-param, requires #[provides])
[[context.uses]]
crate = "bloxide_messaging"
trait = "HasSelfRef<R, PoolMsg>"
field = "self_ref"
field_type = "ActorRef<PoolMsg, R>"
role = "accessor"

# Multi-field context crate: HasWorkers + HasWorkerFactory with impl macro
[[context.uses]]
crate = "blox_ctx_workers"
traits = ["HasWorkers<R>", "HasWorkerFactory<R>"]
impl_macro = "impl_has_workers"

  [[context.uses.fields]]
  name = "worker_refs"
  ty = "Vec<ActorRef<WorkerMsg, R>>"
  role = "state"

  [[context.uses.fields]]
  name = "worker_ctrls"
  ty = "Vec<ActorRef<WorkerCtrl<R>, R>>"
  role = "state"

  [[context.uses.fields]]
  name = "pending"
  ty = "u32"
  role = "state"

# Blox-specific fields
[[context.fields]]
name = "self_id"
ty = "ActorId"

[[context.fields]]
name = "worker_factory"
ty = "WorkerSpawnFn<R>"

[topology]
# Legacy: hand-written StateFns constants in actions.rs
handler_fns = ["IDLE_FNS", "ACTIVE_FNS", "ALL_DONE_FNS"]

[[topology.states]]
name = "Idle"
initial = true

[[topology.states]]
name = "Active"

[[topology.states]]
name = "AllDone"
terminal = true

# --- Declarative transitions (documentation; handler_fns takes precedence) ---

# Idle: SpawnWorker → Active
[[topology.transitions]]
state = "Idle"
event = "PoolMsg::SpawnWorker(_)"
target = "Active"
actions = ["handle_spawn_worker"]

# Active: SpawnWorker stays, WorkDone with guard
[[topology.transitions]]
state = "Active"
event = "PoolMsg::SpawnWorker(_)"
target = "stay"
actions = ["handle_spawn_worker"]

[[topology.transitions]]
state = "Active"
event = "PoolMsg::WorkDone(_)"
target = "stay"
actions = ["handle_work_done"]

[[topology.transitions.guards]]
condition = "ctx.pending() == 0"
target = "AllDone"

# AllDone: entry logs completion
[[topology.entry]]
state = "AllDone"
actions = ["log_all_done"]
