# Copyright 2025 Bloxide, all rights reserved
[package]
name = "pool-blox"
version.workspace = true
edition.workspace = true
description = "Pool actor blox for the worker pool example — runtime-agnostic"
repository.workspace = true
license.workspace = true

[features]
default = ["std"]
std = [
    "bloxide-core/std",
    "pool-actions/std",
]
# Dynamic spawning support: gates spawn_fn, spawn_ref, notify_ref, and
# spawn-related transitions. The Pool is the example of a conditionally-
# dynamic blox — without this feature it compiles but cannot spawn workers.
dynamic = []

[dependencies]
bloxide-core    = { workspace = true, features = ["alloc"] }
bloxide-child-management = { workspace = true }
bloxide-spawn   = { workspace = true, features = ["alloc"] }
bloxide-macros  = { workspace = true }
bloxide-log     = { workspace = true }
bloxide-peers   = { workspace = true }
pool-messages   = { workspace = true }
pool-actions    = { workspace = true }
bloxide-messaging  = { workspace = true }
blox-ctx-workers   = { workspace = true }
bloxide-supervisor = { workspace = true, features = ["alloc"] }

[dev-dependencies]
bloxide-core    = { workspace = true, features = ["std"] }
bloxide-test-runtime = { workspace = true }
bloxide-spawn   = { workspace = true, features = ["std"] }
