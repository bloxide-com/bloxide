[package]
name = "pool-blox"
version.workspace = true
edition.workspace = true
description = "Pool actor blox for the worker pool example — runtime-agnostic"
repository.workspace = true
license.workspace = true

[features]
default = ["std"]
std = [
    "bloxide-core/std",
    "pool-actions/std",
]

[dependencies]
bloxide-core    = { workspace = true, features = ["alloc"] }
bloxide-macros  = { workspace = true }
bloxide-log     = { workspace = true }
pool-messages   = { workspace = true }
pool-actions    = { workspace = true }
bloxide-messaging  = { workspace = true }
blox-ctx-workers   = { workspace = true }

[dev-dependencies]
bloxide-core    = { workspace = true, features = ["std"] }
