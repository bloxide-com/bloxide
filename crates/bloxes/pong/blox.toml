[actor]
name = "Pong"

[context]
name = "PongCtx"
generics = "<R: BloxRuntime>"
actions_crate = "ping_pong_actions"
imports = [
    "ping_pong_actions::HasPeerRef",
    "ping_pong_messages::PingPongMsg",
]

[[context.fields]]
name = "self_id"
ty = "ActorId"

[[context.fields]]
name = "peer_ref"
ty = "ActorRef<PingPongMsg, R>"

[event]
name = "PongEvent"

[[event.mailboxes]]
variant = "Msg"
message = "PingPongMsg"
message_path = "ping_pong_messages::PingPongMsg"

[topology]
# Legacy: hand-written StateFns constants in actions.rs
handler_fns = ["READY_FNS"]

[[topology.states]]
name = "Ready"
initial = true

# --- Declarative transitions (documentation; handler_fns takes precedence) ---
[[topology.transitions]]
state = "Ready"
event = "PingPongMsg::Ping(_)"
target = "stay"
actions = ["Self::reply_pong_action"]
