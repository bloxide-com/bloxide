[actor]
name = "Pong"

[context]
name = "PongCtx"
generics = "<R: BloxRuntime>"
imports = [
    "ping_pong_messages::PingPongMsg",
]

# Accessor trait from bloxide-messaging (2-param, requires #[provides])
[[context.uses]]
crate = "bloxide_messaging"
trait = "HasPeerRef<R, PingPongMsg>"
field = "peer_ref"
field_type = "ActorRef<PingPongMsg, R>"
role = "accessor"

# Blox-specific fields
[[context.fields]]
name = "self_id"
ty = "ActorId"

[event]
name = "PongEvent"

[[event.mailboxes]]
variant = "Msg"
message = "PingPongMsg"
message_path = "ping_pong_messages::PingPongMsg"

[topology]

[[topology.states]]
name = "Ready"
initial = true

[[topology.transitions]]
state = "Ready"
event = "PingPongMsg::Ping(_)"
target = "stay"
actions = ["Self::reply_pong_action"]
