[actor]
name = "Supervisor"

# ── Context struct ───────────────────────────────────────────────────────────
# Single unified variant — no dynamic/non-dynamic split.
# The event enum is now generated by the codegen (standard [event] section).

[context]
name = "SupervisorCtx"
generics = "<R: BloxRuntime>"
on_init = "ctx.children.clear_counters(); ctx.pending = ChildAction::default();"

# Explicit imports — only non-framework crates. Framework types (ActorId,
# ActorRef, BloxRuntime) are auto-detected by the codegen from field types.
imports = [
    "bloxide_core::lifecycle::ChildLifecycleEvent",
    "bloxide_supervisor_context::{ChildAction, ChildGroup, HasChildGroup, HasChildGroupMut, HasChildNotify, HasPending}",
]

# Extra impl blocks emitted after the struct. {ctx} is replaced with the
# actual ctx type (SupervisorCtx<R>).
extra_impls = [
    "HasPending for {ctx} { fn pending(&self) -> ChildAction { self.pending } fn set_pending(&mut self, action: ChildAction) { self.pending = action; } }",
    "{ctx} { pub fn all_children_stopped(&self) -> bool { self.children.all_stopped() } }",
]

# ── Event type (standard codegen-generated event enum) ──────────────────────

[event]
name = "SupervisorEvent"
generics = "<R: BloxRuntime>"

[[event.mailboxes]]
variant = "Child"
message = "ChildLifecycleEvent"
message_path = "bloxide_core::lifecycle::ChildLifecycleEvent"

[[event.mailboxes]]
variant = "Control"
message = "SupervisorControl"
message_path = "bloxide_supervisor_context::SupervisorControl<R>"

# ── Context fields ───────────────────────────────────────────────────────────

[[context.fields]]
name = "children"
ty = "ChildGroup<R>"
role = "ctor"
provides = "HasChildGroup<R>"
provides_mut = "HasChildGroupMut<R>, children_mut"

[[context.fields]]
name = "self_id"
ty = "ActorId"
role = "self_id"

[[context.fields]]
name = "child_notify"
ty = "ActorRef<ChildLifecycleEvent, R>"
role = "ctor"
provides = "HasChildNotify<R>"

[[context.fields]]
name = "pending"
ty = "ChildAction"
role = "state"

# ── Topology ─────────────────────────────────────────────────────────────────
# 2 states, 12 transitions, 2 entry actions. Fully declarative — no handler_fns.

[topology]
spec_imports = [
    "crate::actions::{start_children, stop_all_children, handle_done_or_failed, record_aborted, record_started, record_alive, record_stopped, register_child, handle_health_check, handle_register_dynamic_child}",
    "bloxide_supervisor_context::ChildAction",
]

# Running state — lifecycle handling
[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(Envelope(_, ChildLifecycleEvent::Done { .. }))"
target = "stay"
actions = ["handle_done_or_failed::<{R}>"]
guards = [{ condition = "ctx.pending == ChildAction::BeginShutdown", target = "ShuttingDown" }]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(Envelope(_, ChildLifecycleEvent::Failed { .. }))"
target = "stay"
actions = ["handle_done_or_failed::<{R}>"]
guards = [{ condition = "ctx.pending == ChildAction::BeginShutdown", target = "ShuttingDown" }]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(Envelope(_, ChildLifecycleEvent::Started { .. }))"
target = "stay"
actions = ["record_started::<{R}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(Envelope(_, ChildLifecycleEvent::Aborted { .. }))"
target = "stay"
actions = ["record_aborted::<{R}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(Envelope(_, ChildLifecycleEvent::Alive { .. }))"
target = "stay"
actions = ["record_alive::<{R}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(Envelope(_, ChildLifecycleEvent::Stopped { .. }))"
target = "stay"
actions = ["record_stopped::<{R}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Control(Envelope(_, SupervisorControl::RegisterChild(_)))"
target = "stay"
actions = ["register_child::<{R}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Control(Envelope(_, SupervisorControl::RegisterDynamicChild(_)))"
target = "stay"
actions = ["handle_register_dynamic_child::<{R}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Control(Envelope(_, SupervisorControl::HealthCheckTick))"
target = "stay"
actions = ["handle_health_check::<{R}>"]
guards = [{ condition = "ctx.pending == ChildAction::BeginShutdown", target = "ShuttingDown" }]

# Running state — catch-alls
[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(_)"
target = "stay"

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Control(_)"
target = "stay"

# ShuttingDown state
[[topology.transitions]]
state = "ShuttingDown"
event = "SupervisorEvent::Child(Envelope(_, ChildLifecycleEvent::Stopped { .. }))"
target = "stay"
actions = ["record_stopped::<{R}>"]
guards = [{ condition = "ctx.all_children_stopped()", target = "reset" }]

[[topology.transitions]]
state = "ShuttingDown"
event = "SupervisorEvent::Child(_)"
target = "stay"

[[topology.transitions]]
state = "ShuttingDown"
event = "SupervisorEvent::Control(_)"
target = "stay"

# Entry actions
[[topology.entry]]
state = "Running"
actions = ["start_children::<{R}>"]

[[topology.entry]]
state = "ShuttingDown"
actions = ["stop_all_children::<{R}>"]

# State declarations
[[topology.states]]
name = "Running"
initial = true

[[topology.states]]
name = "ShuttingDown"
