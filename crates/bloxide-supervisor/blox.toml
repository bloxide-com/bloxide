[actor]
name = "Supervisor"

# ── Context struct ───────────────────────────────────────────────────────────
# Single unified variant — no dynamic/non-dynamic split.
# The event enum is hand-written in bloxide-supervisor-context (not generated)
# because it uses inner types (ChildLifecycleEvent, not Envelope<...>) and
# has a generic SupervisorControl<R> that the codegen's Envelope-based pattern
# doesn't support.

[context]
name = "SupervisorCtx"
generics = "<R: BloxRuntime>"
on_init = "ctx.children.clear_counters(); ctx.pending = ChildAction::default();"

# Explicit imports — only non-framework crates. Framework types (ActorId,
# ActorRef, BloxRuntime) are auto-detected by the codegen from field types.
imports = [
    "bloxide_core::lifecycle::ChildLifecycleEvent",
    "bloxide_supervisor_context::{ChildAction, ChildGroup, HasChildGroup, HasChildGroupMut, HasChildNotify, HasPending}",
]

# Extra impl blocks emitted after the struct. {ctx} is replaced with the
# actual ctx type (SupervisorCtx<R>).
extra_impls = [
    "HasPending for {ctx} { fn pending(&self) -> ChildAction { self.pending } fn set_pending(&mut self, action: ChildAction) { self.pending = action; } }",
    "{ctx} { pub fn all_children_stopped(&self) -> bool { self.children.all_stopped() } }",
]

# Event type info (hand-written event enum in bloxide-supervisor-context)
event_name = "SupervisorEvent"
event_generics = "<R>"

# Mailboxes type (hand-written, not derived from [event].mailboxes)
mailboxes_type = "(Rt::Stream<bloxide_core::lifecycle::ChildLifecycleEvent>, Rt::Stream<bloxide_supervisor_context::SupervisorControl<R>>)"

# ── Context fields ───────────────────────────────────────────────────────────

[[context.fields]]
name = "children"
ty = "ChildGroup<R>"
role = "ctor"
provides = "HasChildGroup<R>"
provides_mut = "HasChildGroupMut<R>, children_mut"

[[context.fields]]
name = "self_id"
ty = "ActorId"
role = "self_id"

[[context.fields]]
name = "child_notify"
ty = "ActorRef<ChildLifecycleEvent, R>"
role = "ctor"
provides = "HasChildNotify<R>"

[[context.fields]]
name = "pending"
ty = "ChildAction"
role = "state"

# ── Topology ─────────────────────────────────────────────────────────────────
# 2 states, 12 transitions, 2 entry actions. Fully declarative — no handler_fns.

[topology]
spec_imports = [
    "bloxide_supervisor_actions::{start_children, stop_all_children, handle_done_or_failed, handle_reset, record_started, record_alive, record_stopped, register_child, handle_health_check, handle_register_dynamic_child}",
    "bloxide_supervisor_context::{ChildAction, SupervisorControl}",
    "bloxide_core::lifecycle::ChildLifecycleEvent",
]

# Running state — lifecycle handling
[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(ChildLifecycleEvent::Done { .. })"
target = "stay"
actions = ["handle_done_or_failed::<{R}, {Ctx}, {Event}>"]
guards = [{ condition = "ctx.pending == ChildAction::BeginShutdown", target = "ShuttingDown" }]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(ChildLifecycleEvent::Failed { .. })"
target = "stay"
actions = ["handle_done_or_failed::<{R}, {Ctx}, {Event}>"]
guards = [{ condition = "ctx.pending == ChildAction::BeginShutdown", target = "ShuttingDown" }]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(ChildLifecycleEvent::Reset { .. })"
target = "stay"
actions = ["handle_reset::<{R}, {Ctx}, {Event}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(ChildLifecycleEvent::Started { .. })"
target = "stay"
actions = ["record_started::<{R}, {Ctx}, {Event}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(ChildLifecycleEvent::Alive { .. })"
target = "stay"
actions = ["record_alive::<{R}, {Ctx}, {Event}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Control(SupervisorControl::RegisterChild(_))"
target = "stay"
actions = ["register_child::<{R}, {Ctx}, {Event}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Control(SupervisorControl::RegisterDynamicChild(_))"
target = "stay"
actions = ["handle_register_dynamic_child::<{R}, {Ctx}, {Event}>"]

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Control(SupervisorControl::HealthCheckTick)"
target = "stay"
actions = ["handle_health_check::<{R}, {Ctx}, {Event}>"]
guards = [{ condition = "ctx.pending == ChildAction::BeginShutdown", target = "ShuttingDown" }]

# Running state — catch-alls
[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Child(_)"
target = "stay"

[[topology.transitions]]
state = "Running"
event = "SupervisorEvent::Control(_)"
target = "stay"

# ShuttingDown state
[[topology.transitions]]
state = "ShuttingDown"
event = "SupervisorEvent::Child(ChildLifecycleEvent::Stopped { .. })"
target = "stay"
actions = ["record_stopped::<{R}, {Ctx}, {Event}>"]
guards = [{ condition = "ctx.all_children_stopped()", target = "reset" }]

[[topology.transitions]]
state = "ShuttingDown"
event = "SupervisorEvent::Child(_)"
target = "stay"

[[topology.transitions]]
state = "ShuttingDown"
event = "SupervisorEvent::Control(_)"
target = "stay"

# Entry actions
[[topology.entry]]
state = "Running"
actions = ["start_children::<{R}, {Ctx}>"]

[[topology.entry]]
state = "ShuttingDown"
actions = ["stop_all_children::<{R}, {Ctx}>"]

# State declarations
[[topology.states]]
name = "Running"
initial = true

[[topology.states]]
name = "ShuttingDown"
