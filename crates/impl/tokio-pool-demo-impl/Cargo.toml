[package]
name = "tokio-pool-demo-impl"
version.workspace = true
edition.workspace = true
description = "Concrete worker factory for the Tokio pool demo"
publish = false

[dependencies]
bloxide-core = { workspace = true, features = ["std"] }
bloxide-child-management = { workspace = true, features = ["std"] }
bloxide-spawn = { workspace = true, features = ["std"] }
bloxide-peers = { workspace = true }
bloxide-tokio = { workspace = true }
bloxide-supervisor = { workspace = true, features = ["std"] }
pool-messages = { workspace = true }
pool-actions = { workspace = true }
worker-blox = { workspace = true, features = ["std"] }

[dev-dependencies]
bloxide-core = { workspace = true, features = ["std"] }
bloxide-child-management = { workspace = true, features = ["std"] }
bloxide-supervisor = { workspace = true, features = ["std"] }
bloxide-tokio = { workspace = true }
pool-blox = { workspace = true, features = ["std", "dynamic"] }
pool-messages = { workspace = true }
futures-core = { version = "0.3", default-features = false }
tokio = { workspace = true }
